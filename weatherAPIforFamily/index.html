<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./css/reset.css">
    <link rel="stylesheet" href="./css/style.css">
    <title>Weather API</title>
</head>

<body>
    <div class="message">Establishing space connection</div>
    <div class="container">
        <!-- FIRST CITY -->
        <div class="some-city">
            <div class="line line-top"></div>
            <div class="main-info">
                <div class="city-name">Donetsk</div>
                <div class="tempreture">tempret</div>
            </div>
            <div class="line line-bot"></div>
            <div class="additional-info">

                <div class="weather-icon first"></div>
                <div class="zaglushka" id="fir"></div>
                <div class="weather-judge item">weather-judge</div>
                <div class="wind-speed item">windspeed</div>
                <div class="country item">country</div>
            </div>
        </div>
        <!-- SECOND CITY -->
        <div class="some-city">
            <div class="line line-top"></div>
            <div class="main-info">
                <div class="city-name">Novoross</div>
                <div class="tempreture">tempret</div>
            </div>
            <div class="line line-bot"></div>
            <div class="additional-info">
                <div class="weather-icon second"></div>
                <div class="zaglushka" id="sec"></div>
                <div class="weather-judge item">weather-judge</div>
                <div class="wind-speed item">windspeed</div>
                <div class="country item">country</div>
            </div>
        </div>

        <!-- THIRD CITY  -->
        <div class="some-city">
            <div class="line line-top"></div>
            <div class="main-info">
                <div class="city-name">Taganrog</div>
                <div class="tempreture">tempret</div>
            </div>
            <div class="line line-bot"></div>
            <div class="additional-info">
                <div class="weather-icon third"></div>
                <div class="zaglushka" id="thir"></div>
                <div class="weather-judge item">weather-judge</div>
                <div class="wind-speed item">windspeed</div>
                <div class="country item">country</div>
            </div>
        </div>

        <!-- FOURTH CITY -->
        <div class="some-city">
            <div class="line line-top"></div>
            <div class="main-info">
                <div class="city-name">Murmansk</div>
                <div class="tempreture">tempret</div>
            </div>
            <div class="line line-bot"></div>
            <div class="additional-info">
                <div class="weather-icon fourth"></div>
                <div class="zaglushka" id="four"></div>
                <div class="weather-judge item">weather-judge</div>
                <div class="wind-speed item">windspeed</div>
                <div class="country item">country</div>
            </div>
        </div>
    </div>

    <script type="module" src="./js/script.js"></script>

</body>

</html>
