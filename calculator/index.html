<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./css/reset.css">
    <link rel="stylesheet" href="./css/style.css">
    <title>Document</title>


</head>

<body>
    <form action="#">

        <div class="header">
            <h3>Калькулятор для самых маленьких</h3>
        </div>

        <div class="body">
            <!-- first row -->
            <div class="body__row">
                <p>Введите 1-е число</p>
                <input type="text" id="firstInput">
            </div>
            <div class="sign"></div>
            <!-- second row -->
            <div class="body__row">
                <p>Введите 2-е число</p>
                <input type="text" id="secondInput">
            </div>
            <!-- btn row -->
            <div class="body__btn-row">
                <button id="firstbtn">+</button>
                <button id="secondbtn">-</button>
                <button id="thirdbtn">Посчитать</button>
            </div>
        </div>
    </form>

    <script src="./js/script.js"></script>
</body>

</html>
